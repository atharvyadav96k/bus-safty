name: Multiple Go functions deploy

on:
  push:
    branches:
      - main  
    paths:
  workflow_dispatch:
jobs:

  detect-changes:
    runs-on: ubuntu-latest
    outputs:

    steps:
      - uses: actions/checkout@v3

      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: 

  deploy-main:
    needs: detect-changes
    if: needs.detect-changes.outputs.main == 'true'
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    defaults:
      run:
        working-directory: main

    env:
      TF_VAR_project_id: ${{ secrets.GCP_PROJECT_ID }}
      TF_VAR_project_number: ${{ secrets.GCP_PROJECT_NUMBER }}
      TF_VAR_service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
      TF_VAR_region: ${{ secrets.GCP_REGION }}

    steps:
      - uses: actions/checkout@v3

      - name: Authenticate to GCP (OIDC)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - uses: hashicorp/setup-terraform@v3

      - name: Create Source Zip
        run: |
          cd function
          zip -r ../source.zip .

      - run: terraform init
      - run: terraform plan -input=false
      - run: terraform apply -auto-approve -input=false