name: Deploy Go Function (Reusable)

on:
  workflow_call:
    inputs:
      working-directory:
        required: true
        type: string
      gcp_region:
        required: true
        type: string

    secrets:
      GCP_PROJECT_ID:
        required: true
      GCP_PROJECT_NUMBER:
        required: true
      GCP_SA_EMAIL:
        required: true
      GCP_WIF_PROVIDER:
        required: true
      GCP_BUCKET_NAME:
        required: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}

    env:
      TF_VAR_project_id: ${{ secrets.GCP_PROJECT_ID }}
      TF_VAR_project_number: ${{ secrets.GCP_PROJECT_NUMBER }}
      TF_VAR_service_account: ${{ secrets.GCP_SA_EMAIL }}
      TF_VAR_region: ${{ inputs.gcp_region }}
      TF_VAR_bucket_name: ${{ secrets.GCP_BUCKET_NAME }}

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP (OIDC)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}

      - uses: hashicorp/setup-terraform@v3

      - name: Create Source Zip
        run: |
          cd function
          zip -r ../source.zip .

      - run: terraform init
      - run: terraform plan -input=false
      - run: terraform apply -auto-approve -input=false

deploy.yml
name: Multiple Go Functions Deploy

on:
  push:
    branches:
      - main
    paths:
      - 'demo/**'
      - 'users/create-users/**'
      - 'users/delete-user/**'
      - 'users/update-user/**'
  workflow_dispatch:

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      demo: ${{ steps.filter.outputs.demo }}
      create-users: ${{ steps.filter.outputs.create-users }}
      delete-user: ${{ steps.filter.outputs.delete-user }}
      update-user: ${{ steps.filter.outputs.update-user }}

    steps:
      - uses: actions/checkout@v4

      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            demo:
              - 'demo/**'
            create-users:
              - 'users/create-users/**'
            delete-user:
              - 'users/delete-user/**'
            update-user:
              - 'users/update-user/**'

  deploy-demo:
    needs: detect-changes
    if: needs.detect-changes.outputs.demo == 'true'
    permissions:
      id-token: write
      contents: read
    uses: ./.github/workflows/deploy-function.yml
    with:
      working-directory: demo
      gcp_region: ${{ vars.GCP_REGION }}
    secrets: inherit

  deploy-create-users:
    needs: detect-changes
    if: needs.detect-changes.outputs.create-users == 'true'
    permissions:
      id-token: write
      contents: read
    uses: ./.github/workflows/deploy-function.yml
    with:
      working-directory: users/create-users
      gcp_region: ${{ vars.GCP_REGION }}
    secrets: inherit

  deploy-delete-user:
    needs: detect-changes
    if: needs.detect-changes.outputs.delete-user == 'true'
    permissions:
      id-token: write
      contents: read
    uses: ./.github/workflows/deploy-function.yml
    with:
      working-directory: users/delete-user
      gcp_region: ${{ vars.GCP_REGION }}
    secrets: inherit

  deploy-update-user:
    needs: detect-changes
    if: needs.detect-changes.outputs.update-user == 'true'
    permissions:
      id-token: write
      contents: read
    uses: ./.github/workflows/deploy-function.yml
    with:
      working-directory: users/update-user
      gcp_region: ${{ vars.GCP_REGION }}
    secrets: inherit
