name: Checking for changes

on:
  push:
    branches: [ main ]
jobs:
  changes:
    runs-on: ubuntu-latest
    # Map EVERY filter here so subsequent jobs can see them
    outputs:
      migration: ${{ steps.filter.outputs.migration }}
      register_org: ${{ steps.filter.outputs.register_org }}
      update_org: ${{ steps.filter.outputs.update_org }}
      delete_org: ${{ steps.filter.outputs.delete_org }}
      get_all_org: ${{ steps.filter.outputs.get_all_org }}
      register_user: ${{ steps.filter.outputs.register_user }}
      update_user: ${{ steps.filter.outputs.update_user }}
      delete_user: ${{ steps.filter.outputs.delete_user }}
      get_all_users: ${{ steps.filter.outputs.get_all_users }}
      add_location_bus: ${{ steps.filter.outputs.add_location_bus }}
      delete_bus: ${{ steps.filter.outputs.delete_bus }}
      get_bus_from_org_bus: ${{ steps.filter.outputs.get_bus_from_org_bus }}
      get_location_bus: ${{ steps.filter.outputs.get_location_bus }}
      register_bus: ${{ steps.filter.outputs.register_bus }}
      update_bus: ${{ steps.filter.outputs.update_bus }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            migration: ['migration/**']
            register_org: ['org/register/**']
            update_org: ['org/update/**']
            delete_org: ['org/delete/**']
            get_all_org: ['org/get_all_org/**']
            register_user: ['user/register/**']
            update_user: ['user/update/**']
            delete_user: ['user/delete/**']
            get_all_users: ['user/get_all_users/**']
            add_location_bus: ['bus/add_location/**']
            delete_bus: ['bus/delete/**']
            get_bus_from_org_bus: ['bus/get_bus_from_org/**']
            get_location_bus: ['bus/get_location/**']
            register_bus: ['bus/register/**']
            update_bus: ['bus/update/**']

  migration:
    needs: changes
    if: needs.changes.outputs.migration == 'true'
    permissions:
      id-token: write
      contents: read
    uses: ./.github/workflows/deploy-function.yml
    with:
      working-directory: migration
      gcp_region: ${{ vars.GCP_REGION }}
    secrets: inherit
    
  register_org:
    needs: changes
    if: needs.changes.outputs.register_org == 'true'
    permissions:
      id-token: write
      contents: read
    uses: ./.github/workflows/deploy-function.yml
    with:
      working-directory: org/register
      gcp_region: ${{ vars.GCP_REGION }}
    secrets: inherit

  update_org:
    needs: changes
    if: needs.changes.outputs.update_org == 'true'
    permissions:
      id-token: write
      contents: read
    uses: ./.github/workflows/deploy-function.yml
    with:
      working-directory: org/update
      gcp_region: ${{ vars.GCP_REGION }}
    secrets: inherit

  delete_org:
    needs: changes
    if: needs.changes.outputs.delete_org == 'true'
    permissions:
      id-token: write
      contents: read
    uses: ./.github/workflows/deploy-function.yml
    with:
      working-directory: org/delete
      gcp_region: ${{ vars.GCP_REGION }}
    secrets: inherit

  get_all_org:
    needs: changes
    if: needs.changes.outputs.get_all_org == 'true'
    permissions:
      id-token: write
      contents: read
    uses: ./.github/workflows/deploy-function.yml
    with:
      working-directory: org/get_all_org
      gcp_region: ${{ vars.GCP_REGION }}
    secrets: inherit
    
  register_user:
    needs: changes
    if: needs.changes.outputs.register_user == 'true'
    permissions:
      id-token: write
      contents: read
    uses: ./.github/workflows/deploy-function.yml
    with:
      working-directory: user/register
      gcp_region: ${{ vars.GCP_REGION }}
    secrets: inherit

  update_user:
    needs: changes
    if: needs.changes.outputs.update_user == 'true'
    permissions:
      id-token: write
      contents: read
    uses: ./.github/workflows/deploy-function.yml
    with:
      working-directory: user/update
      gcp_region: ${{ vars.GCP_REGION }}
    secrets: inherit

  delete_user:
    needs: changes
    if: needs.changes.outputs.delete_user == 'true'
    permissions:
      id-token: write
      contents: read
    uses: ./.github/workflows/deploy-function.yml
    with:
      working-directory: user/delete
      gcp_region: ${{ vars.GCP_REGION }}
    secrets: inherit

  get_all_users:
    needs: changes 
    if: needs.changes.outputs.get_all_users == 'true'
    permissions:
      id-token: write
      contents: read
    uses: ./.github/workflows/deploy-function.yml
    with:
      working-directory: user/get_all_users
      gcp_region: ${{ vars.GCP_REGION }}
    secrets: inherit

  add_location_bus:
    needs: changes
    if: needs.changes.outputs.add_location_bus == 'true'
    permissions:
      id-token: write
      contents: read
    uses: ./.github/workflows/deploy-function.yml
    with:
      working-directory: bus/add_location
      gcp_region: ${{ vars.GCP_REGION }}
    secrets: inherit

  delete_bus:
    needs: changes
    if: needs.changes.outputs.delete_bus == 'true'
    permissions:
      id-token: write
      contents: read
    uses: ./.github/workflows/deploy-function.yml
    with:
      working-directory: bus/delete
      gcp_region: ${{ vars.GCP_REGION }}
    secrets: inherit

  get_bus_from_org_bus:
    needs: changes
    if: needs.changes.outputs.get_bus_from_org_bus == 'true'
    permissions:
      id-token: write
      contents: read
    uses: ./.github/workflows/deploy-function.yml
    with:
      working-directory: bus/get_bus_from_org
      gcp_region: ${{ vars.GCP_REGION }}
    secrets: inherit
    
  get_location_bus:
    needs: changes
    if: needs.changes.outputs.get_location_bus == 'true'
    permissions:
      id-token: write
      contents: read
    uses: ./.github/workflows/deploy-function.yml
    with:
      working-directory: bus/get_location
      gcp_region: ${{ vars.GCP_REGION }}
    secrets: inherit 

  register_bus:
    needs: changes
    if: needs.changes.outputs.register_bus == 'true'
    permissions:
      id-token: write
      contents: read
    uses: ./.github/workflows/deploy-function.yml
    with:
      working-directory: bus/register
      gcp_region: ${{ vars.GCP_REGION }}
    secrets: inherit  

  update_bus:
    needs: changes
    if: needs.changes.outputs.update_bus == 'true'
    permissions:
      id-token: write
      contents: read
    uses: ./.github/workflows/deploy-function.yml
    with:
      working-directory: bus/update
      gcp_region: ${{ vars.GCP_REGION }}
    secrets: inherit  