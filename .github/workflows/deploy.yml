name: Checking for changes

on:
  push:
    branches: [ main ]

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      register_org: ${{ steps.filter.outputs.register_org }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            register_org:
              - 'org/register/**'
            regiser_user:
              - 'user/register/**'

  register_org:
    needs: changes
    if: needs.changes.outputs.register_org == 'true'
    permissions:
      id-token: write
      contents: read
    uses: ./.github/workflows/deploy-function.yml
    with:
      working-directory: register
    secrets: inherit
    
  register_user:
    needs: changes
    if: needs.changes.outputs.regiser_user == 'true'
    permissions:
      id-token: write
      contents: read
    uses: ./.github/workflows/deploy-function.yml
    with:
      working-directory: register
    secrets: inherit
  