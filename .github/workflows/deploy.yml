name: Checking for changes

on:
  push:
    branches: [ main ]
jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      register_org: ${{ steps.filter.outputs.register_org }}
      register_user: ${{ steps.filter.outputs.register_user }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            register_org:
              - 'org/register/**'
            register_user:
              - 'user/register/**'

  register_org:
    needs: changes
    if: needs.changes.outputs.register_org == 'true'
    permissions:
      id-token: write
      contents: read
    uses: ./.github/workflows/deploy-function.yml
    with:
      working-directory: org/register
      gcp_region: "us-central1"
    secrets: inherit
    
  register_user:
    needs: changes
    if: needs.changes.outputs.register_user == 'true'
    permissions:
      id-token: write
      contents: read
    uses: ./.github/workflows/deploy-function.yml
    with:
      working-directory: user/register
      gcp_region: ${{ vars.GCP_REGION }}
    secrets: inherit