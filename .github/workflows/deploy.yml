name: Checking for changes

on:
  push:
    branches: [ main ]

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      server: ${{ steps.filter.outputs.server }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            server:
              - 'dogzh/server/**'

  deploy-server:
    needs: changes
    if: needs.changes.outputs.server == 'true'
    permissions:
      id-token: write
      contents: read
    uses: ./.github/workflows/reusable-server.yml
    with:
      working-directory: dogzh-server/server
    secrets: inherit