name: Checking for changes

on:
  push:
    branches: [ main ]
jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      register_org: ${{ steps.filter.outputs.register_org }}
      register_user: ${{ steps.filter.outputs.register_user }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            register_org:
              - 'org/register/**'
            update_org:
              - 'org/update/**'
            delete_org:
              - 'org/delete/**'
            get_all_org:
              - 'org/get_all_org/**'
          
            register_user:
              - 'user/register/**'
            update_user:
              - 'user/update/**'
            delete_user:
              - 'user/delete/**'
            get_all_users:
              - 'user/get_all_users/**'

  register_org:
    needs: changes
    if: needs.changes.outputs.register_org == 'true'
    permissions:
      id-token: write
      contents: read
    uses: ./.github/workflows/deploy-function.yml
    with:
      working-directory: org/register
      gcp_region: ${{ vars.GCP_REGION }}
    secrets: inherit

  update_org:
    needs: changes
    if: needs.changes.outputs.update_org == 'true'
    permissions:
      id-token: write
      contents: read
    uses: ./.github/workflows/deploy-function.yml
    with:
      working-directory: org/update
      gcp_region: ${{ vars.GCP_REGION }}
    secrets: inherit

  delete_org:
    needs: changes
    if: needs.changes.outputs.delete_org == 'true'
    permissions:
      id-token: write
      contents: read
    uses: ./.github/workflows/deploy-function.yml
    with:
      working-directory: org/delete
      gcp_region: ${{ vars.GCP_REGION }}
    secrets: inherit

  get_all_org:
    needs: changes
    if: needs.changes.outputs.get_all_org == 'true'
    permissions:
      id-token: write
      contents: read
    uses: ./.github/workflows/deploy-function.yml
    with:
      working-directory: org/get_all_org
      gcp_region: ${{ vars.GCP_REGION }}
    secrets: inherit
    
  register_user:
    needs: changes
    if: needs.changes.outputs.register_user == 'true'
    permissions:
      id-token: write
      contents: read
    uses: ./.github/workflows/deploy-function.yml
    with:
      working-directory: user/register
      gcp_region: ${{ vars.GCP_REGION }}
    secrets: inherit

  update_user:
    needs: changes
    if: needs.changes.outputs.update_user == 'true'
    permissions:
      id-token: write
      contents: read
    uses: ./.github/workflows/deploy-function.yml
    with:
      working-directory: user/update
      gcp_region: ${{ vars.GCP_REGION }}
    secrets: inherit

  delete_user:
    needs: changes
    if: needs.changes.outputs.delete_user == 'true'
    permissions:
      id-token: write
      contents: read
    uses: ./.github/workflows/deploy-function.yml
    with:
      working-directory: user/delete
      gcp_region: ${{ vars.GCP_REGION }}
    secrets: inherit

  get_all_users:
    needs: changes 
    if: needs.changes.outputs.get_all_users == 'true'
    permissions:
      id-token: write
      contents: read
    uses: ./.github/workflows/deploy-function.yml
    with:
      working-directory: user/get_all_users
      gcp_region: ${{ vars.GCP_REGION }}
    secrets: inherit